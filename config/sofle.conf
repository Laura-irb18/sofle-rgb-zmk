# Enable the Sofle OLED Display
CONFIG_ZMK_DISPLAY=y

# Enable support for encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Enable ZMK Studio for real-time keymap editing
CONFIG_ZMK_STUDIO=y

# High-voltage DCDC: ZMK >= v0.3 disabled it by default (for inductor-less
# clones); without it VCC comes from the internal LDO and cannot power the
# 36 LEDs.
CONFIG_BOARD_ENABLE_DCDC_HV=y

# RGB FX (replaces ZMK's stock underglow, which only has 4 effects).
# The stock underglow enabled SPI/LED_STRIP; now we enable them by hand.
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_SPI=y
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_FX=y
